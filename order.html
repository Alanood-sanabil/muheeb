<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>مُهيب — اطلب ثوبك</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/order.css" />
</head>
<body>

  <!-- SCREEN 1: Landing -->
  <div id="screen-1" class="screen">
    <div class="order-hero">
      <div class="order-logo" id="order-logo"></div>
      <div class="order-tagline" id="order-tagline"></div>
      <h2 class="order-headline" id="order-headline"></h2>
      <p class="order-sub" id="order-sub"></p>
      <button class="btn-order-landing" id="order-landing-cta" onclick="showScreen(2)"></button>
      <div class="badges" id="order-badges"></div>
    </div>
  </div>

  <!-- SCREEN 2: Step 1 — Thoob Customization -->
  <div id="screen-2" class="screen">
    <div class="progress-wrap">
      <div class="progress-bar">
        <div class="progress-seg"></div>
        <div class="progress-seg"></div>
        <div class="progress-seg"></div>
      </div>
      <div class="progress-labels">
        <span class="progress-label"></span>
        <span class="progress-label"></span>
        <span class="progress-label"></span>
      </div>
    </div>
    <div class="screen-inner">
      <div class="step-content">
        <button class="back-btn" id="step1-back" onclick="showScreen(1, true)"></button>

        <!-- Color -->
        <div class="section-group">
          <div class="section-title" id="color-title"></div>
          <div class="cards-row" id="color-cards"></div>
          <div class="error-msg" id="error-color">الرجاء اختيار لون الثوب</div>
        </div>

        <!-- Fabric -->
        <div class="section-group">
          <div class="section-title" id="fabric-title"></div>
          <div class="section-sub" id="fabric-sub"></div>
          <div class="cards-row" id="fabric-cards"></div>
          <div class="error-msg" id="error-fabric">الرجاء اختيار نوع القماش</div>
        </div>

        <!-- Collar -->
        <div class="section-group">
          <div class="section-title" id="collar-title"></div>
          <div class="cards-row" id="collar-cards"></div>
          <div class="error-msg" id="error-collar">الرجاء اختيار نوع الياقة</div>
        </div>

        <button class="btn-order" id="step1-next" onclick="validateStep1()"></button>
        <div class="error-msg" id="error-step1" style="text-align:center; margin-top:8px;">الرجاء اختيار جميع الخيارات</div>
      </div>
    </div>
  </div>

  <!-- SCREEN 3: Step 2 — Measurements -->
  <div id="screen-3" class="screen">
    <div class="progress-wrap">
      <div class="progress-bar">
        <div class="progress-seg"></div>
        <div class="progress-seg"></div>
        <div class="progress-seg"></div>
      </div>
      <div class="progress-labels">
        <span class="progress-label"></span>
        <span class="progress-label"></span>
        <span class="progress-label"></span>
      </div>
    </div>
    <div class="screen-inner">
      <div class="step-content">
        <button class="back-btn" id="step2-back" onclick="showScreen(2, true)"></button>
        <p class="section-sub" id="step2-intro" style="margin-bottom:24px;"></p>

        <!-- Height -->
        <div class="field">
          <label id="height-label"></label>
          <div class="input-wrap">
            <input type="text" inputmode="numeric" id="input-height" style="padding-left:50px;" />
            <span class="unit-label" id="height-unit"></span>
          </div>
          <div class="helper-text" id="height-helper"></div>
          <div class="error-msg" id="error-height">الرجاء إدخال الطول</div>
        </div>

        <!-- Weight -->
        <div class="field">
          <label id="weight-label"></label>
          <div class="input-wrap">
            <input type="text" inputmode="numeric" id="input-weight" style="padding-left:60px;" />
            <span class="unit-label" id="weight-unit"></span>
          </div>
          <div class="error-msg" id="error-weight">الرجاء إدخال الوزن</div>
        </div>

        <!-- Body Type -->
        <div class="section-group">
          <div class="section-title" id="body-title"></div>
          <div class="section-sub" id="body-sub"></div>
          <div class="cards-row" id="body-cards"></div>
          <div class="error-msg" id="error-body">الرجاء اختيار شكل الجسم</div>
        </div>

        <button class="btn-order" id="step2-next" onclick="validateStep2()"></button>
      </div>
    </div>
  </div>

  <!-- SCREEN 4: Step 3 — Contact + Summary -->
  <div id="screen-4" class="screen">
    <div class="progress-wrap">
      <div class="progress-bar">
        <div class="progress-seg"></div>
        <div class="progress-seg"></div>
        <div class="progress-seg"></div>
      </div>
      <div class="progress-labels">
        <span class="progress-label"></span>
        <span class="progress-label"></span>
        <span class="progress-label"></span>
      </div>
    </div>
    <div class="screen-inner">
      <div class="step-content">
        <button class="back-btn" id="step3-back" onclick="showScreen(3, true)"></button>

        <!-- Name -->
        <div class="field">
          <label id="name-label"></label>
          <div class="input-wrap">
            <input type="text" id="input-name" />
          </div>
          <div class="error-msg" id="error-name">الرجاء إدخال الاسم</div>
        </div>

        <!-- Phone -->
        <div class="field">
          <label id="phone-label"></label>
          <div class="input-wrap">
            <input type="tel" id="input-phone" />
          </div>
          <div class="helper-text" id="phone-note"></div>
          <div class="error-msg" id="error-phone">الرجاء إدخال رقم الجوال</div>
        </div>

        <!-- City -->
        <div class="field">
          <label id="city-label"></label>
          <div class="input-wrap">
            <select id="input-city"></select>
          </div>
          <div class="error-msg" id="error-city">الرجاء اختيار المدينة</div>
        </div>

        <!-- Order Summary -->
        <div class="summary-card">
          <h3 id="summary-title"></h3>
          <div class="summary-row"><span class="label" id="sum-color-label"></span><span id="sum-color">—</span></div>
          <div class="summary-row"><span class="label" id="sum-fabric-label"></span><span id="sum-fabric">—</span></div>
          <div class="summary-row"><span class="label" id="sum-collar-label"></span><span id="sum-collar">—</span></div>
          <div class="summary-row"><span class="label" id="sum-height-label"></span><span id="sum-height">—</span></div>
          <div class="summary-row"><span class="label" id="sum-weight-label"></span><span id="sum-weight">—</span></div>
          <div class="summary-row"><span class="label" id="sum-body-label"></span><span id="sum-body">—</span></div>
          <hr class="summary-sep" />
          <div class="summary-price"><span id="sum-price-label"></span><span id="sum-price">—</span></div>
        </div>

        <button class="btn-order" id="step3-submit" onclick="validateStep3()"></button>
      </div>
    </div>
  </div>

  <!-- SCREEN 5: Confirmation -->
  <div id="screen-5" class="screen">
    <div class="confirm-center">
      <div class="checkmark-circle">
        <svg viewBox="0 0 100 100">
          <circle class="circle" cx="50" cy="50" r="45" />
          <path class="check" d="M30 52 L44 66 L70 38" />
        </svg>
      </div>
      <h2 id="confirm-title"></h2>
      <p id="confirm-sub"></p>
      <div class="order-ref" id="order-ref"></div>
      <hr class="confirm-sep" />
      <a class="btn-whatsapp" id="confirm-wa-btn" target="_blank">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
      </a>
    </div>
  </div>

  <script src="content/content.js"></script>
  <script src="js/order.js"></script>
</body>
</html>
