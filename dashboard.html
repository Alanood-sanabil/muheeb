<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>مُهيب — لوحة الطلبات</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black:  #0A0A0A;
      --white:  #FFFFFF;
      --gray:   #767676;
      --light:  #F5F5F5;
      --faint:  #FAFAFA;
      --border: #E8E8E8;
      --err:    #C0392B;
    }

    body {
      font-family: 'Cairo', sans-serif;
      background: var(--white);
      color: var(--black);
      direction: rtl;
      min-height: 100vh;
    }

    /* ── LOGIN GATE ── */
    #login-screen {
      position: fixed;
      inset: 0;
      background: var(--white);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }

    #login-screen.hidden { display: none; }

    .login-card {
      width: 100%;
      max-width: 380px;
      padding: 0 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    .login-logo {
      font-size: 2.2rem;
      font-weight: 800;
      color: var(--black);
      letter-spacing: -0.02em;
      margin-bottom: 6px;
    }

    .login-sub {
      font-size: 0.85rem;
      font-weight: 400;
      color: var(--gray);
      margin-bottom: 36px;
    }

    .login-input {
      width: 100%;
      height: 52px;
      padding: 0 16px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-family: 'Cairo', sans-serif;
      font-size: 0.95rem;
      color: var(--black);
      background: var(--white);
      outline: none;
      direction: rtl;
      text-align: right;
      transition: border-color 0.15s;
      margin-bottom: 12px;
    }

    .login-input:focus { border-color: var(--black); }
    .login-input::placeholder { color: #CCCCCC; }

    .login-input.shake {
      animation: shake 0.35s ease;
      border-color: var(--err);
    }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%      { transform: translateX(-7px); }
      40%      { transform: translateX(7px); }
      60%      { transform: translateX(-5px); }
      80%      { transform: translateX(5px); }
    }

    .login-btn {
      width: 100%;
      height: 52px;
      background: var(--black);
      color: var(--white);
      border: none;
      border-radius: 8px;
      font-family: 'Cairo', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s;
      margin-bottom: 10px;
    }

    .login-btn:hover { opacity: 0.85; }

    .login-error {
      font-size: 0.8rem;
      font-weight: 400;
      color: var(--err);
      text-align: center;
      min-height: 1.2em;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .login-error.visible { opacity: 1; }

    /* Dashboard hidden until authenticated */
    #dashboard { display: none; }

    /* ── HEADER ── */
    .header {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 16px 28px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .brand h1 {
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--black);
      line-height: 1.1;
      letter-spacing: -0.01em;
    }

    .brand p {
      font-size: 0.72rem;
      font-weight: 400;
      color: var(--gray);
      margin-top: 2px;
    }

    .conn-status {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 0.78rem;
      font-weight: 400;
      color: var(--gray);
    }

    .conn-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--border);
      flex-shrink: 0;
      transition: background 0.3s;
    }
    .conn-dot.ok  { background: #27AE60; }
    .conn-dot.err { background: var(--err); }

    /* ── MAIN ── */
    .main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 28px 20px 60px;
    }

    /* ── TABS ── */
    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .tab-btn {
      height: 40px;
      padding: 0 20px;
      font-family: 'Cairo', sans-serif;
      font-size: 0.88rem;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      border: 1.5px solid var(--black);
      background: var(--white);
      color: var(--black);
      white-space: nowrap;
    }

    .tab-btn.active {
      background: var(--black);
      color: var(--white);
    }

    .export-btn {
      height: 40px;
      padding: 0 16px;
      margin-inline-start: auto;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-family: 'Cairo', sans-serif;
      font-size: 0.88rem;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      border: 1.5px solid var(--black);
      background: var(--white);
      color: var(--black);
      transition: background 0.15s, color 0.15s;
      white-space: nowrap;
    }

    .export-btn:hover { background: #F5F5F5; }
    .export-btn:active { background: #EEEEEE; }
    .export-btn:disabled { opacity: 0.45; cursor: not-allowed; background: var(--white); }
    .export-btn svg { flex-shrink: 0; }

    /* ── STATUS STATS ── */
    .status-stats-row {
      display: flex;
      gap: 12px;
      overflow-x: auto;
      margin-bottom: 20px;
      scrollbar-width: none;
      padding-bottom: 4px;
    }
    .status-stats-row::-webkit-scrollbar { display: none; }
    .status-stat-card {
      min-width: 130px;
      border-radius: 12px;
      padding: 16px 20px;
      flex-shrink: 0;
    }
    .status-stat-num {
      font-family: 'Cairo', sans-serif;
      font-size: 2rem;
      font-weight: 800;
      color: #0A0A0A;
      line-height: 1;
      margin-bottom: 4px;
    }
    .status-stat-label {
      font-family: 'Cairo', sans-serif;
      font-size: 0.72rem;
      font-weight: 400;
      color: #767676;
    }

    /* ── STATUS PILL & DROPDOWN ── */
    .status-pill {
      display: inline-flex;
      align-items: center;
      border-radius: 20px;
      padding: 4px 12px;
      font-family: 'Cairo', sans-serif;
      font-weight: 600;
      font-size: 0.78rem;
      cursor: pointer;
      position: relative;
      white-space: nowrap;
      user-select: none;
    }
    #floating-dropdown {
      position: fixed;
      background: #FFFFFF;
      border: 1px solid #E8E8E8;
      border-radius: 10px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.12);
      z-index: 9999;
      min-width: 140px;
      padding: 4px 0;
      display: none;
    }
    #floating-dropdown.open { display: block; }
    .status-option {
      padding: 8px 14px;
      font-family: 'Cairo', sans-serif;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .status-option:hover { background: #F5F5F5; }
    .status-option-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* ── SEARCH ── */
    .search-wrap {
      margin-bottom: 16px;
    }

    .search-input {
      width: 100%;
      height: 46px;
      padding: 0 16px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-family: 'Cairo', sans-serif;
      font-size: 0.9rem;
      color: var(--black);
      background: var(--white);
      outline: none;
      direction: rtl;
      transition: border-color 0.15s;
    }

    .search-input:focus { border-color: var(--black); }
    .search-input::placeholder { color: #CCCCCC; }

    /* ── TABLE ── */
    .table-wrap {
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 700px;
    }

    thead tr {
      background: var(--black);
    }

    thead th {
      padding: 12px 16px;
      font-family: 'Cairo', sans-serif;
      font-size: 0.82rem;
      font-weight: 700;
      color: var(--white);
      text-align: right;
      white-space: nowrap;
    }

    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.1s;
    }

    tbody tr:nth-child(even) { background: var(--faint); }
    tbody tr:nth-child(odd)  { background: var(--white); }
    tbody tr:last-child      { border-bottom: none; }
    tbody tr:hover           { background: var(--light); }

    td {
      padding: 12px 16px;
      font-family: 'Cairo', sans-serif;
      font-size: 0.85rem;
      color: var(--black);
      text-align: right;
      white-space: nowrap;
    }

    td.num-cell {
      font-weight: 700;
      direction: ltr;
      text-align: right;
    }

    td.date-cell {
      font-size: 0.78rem;
      color: var(--gray);
      direction: ltr;
      text-align: right;
    }

    td.phone-cell {
      direction: ltr;
      text-align: right;
    }

    /* ── STATES ── */
    .state-row td {
      text-align: center;
      padding: 52px 16px;
      color: var(--gray);
      font-size: 0.9rem;
    }

    .state-row.error td {
      color: var(--err);
    }

    /* ── LOADING SPINNER ── */
    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid var(--border);
      border-top-color: var(--black);
      border-radius: 50%;
      animation: spin 0.65s linear infinite;
      vertical-align: middle;
      margin-left: 8px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── DAY SECTIONS ── */
    .day-section {
      margin-bottom: 24px;
    }

    .day-label-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .day-label {
      font-family: 'Cairo', sans-serif;
      font-size: 1rem;
      font-weight: 800;
      color: var(--black);
    }

    .day-badge {
      background: var(--black);
      color: var(--white);
      font-family: 'Cairo', sans-serif;
      font-size: 0.72rem;
      font-weight: 700;
      border-radius: 20px;
      padding: 2px 10px;
      white-space: nowrap;
    }

    /* ── TABLE FOOTER ── */
    .tfoot {
      margin-top: 10px;
      font-size: 0.74rem;
      color: var(--gray);
      text-align: left;
      padding: 0 2px;
    }
  </style>
</head>
<body>

  <!-- LOGIN GATE -->
  <div id="login-screen">
    <div class="login-card">
      <div class="login-logo">مُهيب</div>
      <input
        type="password"
        class="login-input"
        id="login-input"
        placeholder="كلمة المرور"
        onkeydown="if(event.key==='Enter') attemptLogin()"
      />
      <button class="login-btn" onclick="attemptLogin()">دخول</button>
      <div class="login-error" id="login-error">كلمة المرور غير صحيحة</div>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard">

  <!-- HEADER -->
  <header class="header">
    <div class="header-inner">
      <div class="brand">
        <h1>مُهيب</h1>
        <p>لوحة الطلبات</p>
      </div>
      <div class="conn-status">
        <div class="conn-dot" id="conn-dot"></div>
        <span id="conn-label">جاري الاتصال...</span>
      </div>
    </div>
  </header>

  <!-- MAIN -->
  <main class="main">

    <!-- TABS -->
    <div class="tabs">
      <button class="tab-btn active" id="tab-orders"    onclick="switchTab('orders')">طلبات الثوب الجاهز</button>
      <button class="tab-btn"        id="tab-tailoring" onclick="switchTab('tailoring')">طلبات التفصيل</button>
      <button class="export-btn" id="btn-export-csv" type="button" onclick="exportCSV()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        <span>تصدير CSV</span>
      </button>
    </div>

    <!-- STATUS STATS -->
    <div class="status-stats-row" id="status-stats-row">
      <!-- cards rendered by JS -->
    </div>

    <!-- SEARCH -->
    <div class="search-wrap">
      <input
        type="text"
        class="search-input"
        id="search-input"
        placeholder="ابحث بالاسم أو الهاتف..."
        oninput="applyFilter()"
      />
    </div>

    <!-- TABLES (grouped by day) -->
    <div id="table-container">
      <div class="table-wrap">
        <table>
          <tbody>
            <tr class="state-row">
              <td colspan="10"><span class="spinner"></span> جاري تحميل البيانات...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
    <div class="tfoot" id="tfoot"></div>

  </main>

  </div><!-- /#dashboard -->

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // ── AUTH GATE ────────────────────────────────────────────────
    const AUTH_KEY  = 'muheeb_admin_auth';
    const AUTH_PASS = 'Muheeb2026';

    function showDashboard() {
      document.getElementById('login-screen').classList.add('hidden');
      document.getElementById('dashboard').style.display = 'block';
    }

    function attemptLogin() {
      const input = document.getElementById('login-input');
      const err   = document.getElementById('login-error');
      if (input.value === AUTH_PASS) {
        sessionStorage.setItem(AUTH_KEY, '1');
        showDashboard();
        loadTab('orders');
      } else {
        err.classList.add('visible');
        input.classList.remove('shake');
        void input.offsetWidth; // reflow to restart animation
        input.classList.add('shake');
        input.value = '';
        input.focus();
      }
    }

    // Check auth on load
    if (sessionStorage.getItem(AUTH_KEY) === '1') {
      showDashboard();
    }

    // ── CONFIG ───────────────────────────────────────────────────
    const SUPABASE_URL = 'https://mwcmfzzukqiutztkgagg.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_8zuxMDAcYGIozcmi8CS8sg_ZnjLmb6V';

    const { createClient } = supabase;
    const db = createClient(SUPABASE_URL, SUPABASE_KEY);

    // ── TABLE SCHEMAS ────────────────────────────────────────────
    const SCHEMAS = {
      orders: {
        table: 'orders',
        cols: [
          { label: 'رقم الطلب',   key: 'order_number', cls: 'num-cell'   },
          { label: 'الحالة',      key: 'status',        fmt: 'status'     },
          { label: 'الاسم',       key: 'name'                             },
          { label: 'الهاتف',      key: 'phone',         cls: 'phone-cell' },
          { label: 'المدينة',     key: 'city'                             },
          { label: 'اللون',       key: 'color'                            },
          { label: 'القماش',      key: 'fabric'                           },
          { label: 'الياقة',      key: 'collar'                           },
          { label: 'نوع الجسم',    key: 'body_type'                        },
          { label: 'المقاس المفضل', key: 'fit_preference'                  },
          { label: 'الطول',       key: 'height'                           },
          { label: 'الوزن',       key: 'weight'                           },
          { label: 'مقاس الحذاء', key: 'shoe_size'                        },
          { label: 'العمر',       key: 'age'                              },
          { label: 'تاريخ الطلب', key: 'created_at',    cls: 'date-cell', fmt: 'date' },
        ],
      },
      tailoring: {
        table: 'tailoring_orders',
        cols: [
          { label: 'رقم الطلب',   key: 'order_number', cls: 'num-cell'   },
          { label: 'الاسم',       key: 'name'                             },
          { label: 'الهاتف',      key: 'phone',         cls: 'phone-cell' },
          { label: 'المدينة',     key: 'city'                             },
          { label: 'الباقة',      key: 'package'                          },
          { label: 'السعر',       key: 'price'                            },
          { label: 'يوم الزيارة', key: 'visit_day'                        },
          { label: 'وقت الزيارة', key: 'visit_time'                       },
          { label: 'تاريخ الطلب', key: 'created_at',    cls: 'date-cell', fmt: 'date' },
        ],
      },
    };

    // ── STATE ────────────────────────────────────────────────────
    let activeTab    = 'orders';
    let allRows      = [];
    let filteredRows = [];

    // ── STATUS CONFIG ─────────────────────────────────────────────
    const STATUS_LIST = [
      { label: 'طلب جديد',   bg: '#F0F0F0', color: '#0A0A0A' },
      { label: 'تم التواصل', bg: '#E8F4FD', color: '#1A6B9A' },
      { label: 'دفع',        bg: '#FFF3CD', color: '#856404' },
      { label: 'تم الشحن',  bg: '#D1F2EB', color: '#0E6655' },
      { label: 'تعديل',      bg: '#FDE8D8', color: '#9C4A1A' },
      { label: 'ملغي',       bg: '#FADBD8', color: '#922B21' },
    ];

    const STATUS_CARDS = [
      { label: 'إجمالي الطلبات', key: null,         bg: '#F5F5F5' },
      { label: 'طلب جديد',       key: 'طلب جديد',   bg: '#F0F0F0' },
      { label: 'تم التواصل',     key: 'تم التواصل',  bg: '#E8F4FD' },
      { label: 'دفع',            key: 'دفع',         bg: '#FFF3CD' },
      { label: 'تم الشحن',       key: 'تم الشحن',   bg: '#D1F2EB' },
      { label: 'تعديل',          key: 'تعديل',       bg: '#FDE8D8' },
      { label: 'ملغي',           key: 'ملغي',        bg: '#FADBD8' },
    ];

    function getStatusStyle(statusVal) {
      const s = STATUS_LIST.find(x => x.label === statusVal);
      return s || STATUS_LIST[0]; // default to 'طلب جديد' style
    }

    function buildStatusPill(row) {
      const statusVal = (row.status && row.status.trim()) ? row.status : 'طلب جديد';
      const style = getStatusStyle(statusVal);
      return `<div class="status-pill" data-order-id="${row.id}" style="background:${style.bg};color:${style.color}">${statusVal}</div>`;
    }

    // ── HELPERS ──────────────────────────────────────────────────
    function fmtDate(iso) {
      if (!iso) return '—';
      const d   = new Date(iso);
      const p   = n => String(n).padStart(2, '0');
      return `${p(d.getDate())}/${p(d.getMonth()+1)}/${d.getFullYear()} ${p(d.getHours())}:${p(d.getMinutes())}`;
    }

    function cellVal(row, col) {
      const v = row[col.key];
      if (col.fmt === 'status') return buildStatusPill(row);
      if (v === null || v === undefined || v === '') return '—';
      if (col.fmt === 'date') return fmtDate(v);
      return v;
    }

    // ── DATE GROUPING ─────────────────────────────────────────────
    const RIYADH_TZ = 'Asia/Riyadh';

    function toRiyadhDateStr(iso) {
      if (!iso) return '';
      return new Date(iso).toLocaleDateString('en-CA', { timeZone: RIYADH_TZ }); // YYYY-MM-DD
    }

    function todayRiyadh() {
      return new Date().toLocaleDateString('en-CA', { timeZone: RIYADH_TZ });
    }

    function yesterdayRiyadh() {
      const d = new Date();
      d.setDate(d.getDate() - 1);
      return d.toLocaleDateString('en-CA', { timeZone: RIYADH_TZ });
    }

    const AR_DAYS   = ['الأحد','الاثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];
    const AR_MONTHS = ['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];

    function fmtGroupLabel(dateStr) {
      // dateStr = YYYY-MM-DD
      const [y, m, day] = dateStr.split('-').map(Number);
      const d = new Date(y, m - 1, day);
      return `${AR_DAYS[d.getDay()]}، ${day} ${AR_MONTHS[m - 1]}`;
    }

    // ── STATS ────────────────────────────────────────────────────
    function updateStats(rows) {
      const container = document.getElementById('status-stats-row');
      if (!container) return;
      // Only show status stats for orders tab
      if (activeTab !== 'orders') {
        container.innerHTML = '';
        return;
      }
      container.innerHTML = STATUS_CARDS.map((card, i) => {
        let count;
        if (card.key === null) {
          count = rows.length;
        } else if (card.key === 'طلب جديد') {
          count = rows.filter(r => !r.status || r.status === 'طلب جديد').length;
        } else {
          count = rows.filter(r => r.status === card.key).length;
        }
        return `<div class="status-stat-card" style="background:${card.bg}">
          <div class="status-stat-num">${count}</div>
          <div class="status-stat-label">${card.label}</div>
        </div>`;
      }).join('');
    }

    function resetStats() {
      const container = document.getElementById('status-stats-row');
      if (!container) return;
      if (activeTab !== 'orders') {
        container.innerHTML = '';
        return;
      }
      container.innerHTML = STATUS_CARDS.map(card =>
        `<div class="status-stat-card" style="background:${card.bg}">
          <div class="status-stat-num">—</div>
          <div class="status-stat-label">${card.label}</div>
        </div>`
      ).join('');
    }

    // ── BUILD TABLE HTML ──────────────────────────────────────────
    function buildTable(rows, schema) {
      const thead = '<thead><tr>' + schema.cols.map(c => `<th>${c.label}</th>`).join('') + '</tr></thead>';
      const tbody = '<tbody>' + rows.map(row =>
        '<tr>' + schema.cols.map(col => {
          const cls = col.cls ? ` class="${col.cls}"` : '';
          return `<td${cls}>${cellVal(row, col)}</td>`;
        }).join('') + '</tr>'
      ).join('') + '</tbody>';
      return `<div class="table-wrap"><table>${thead}${tbody}</table></div>`;
    }

    // ── RENDER BODY ───────────────────────────────────────────────
    function renderBody(rows, schema) {
      const container = document.getElementById('table-container');
      const tfoot     = document.getElementById('tfoot');

      if (!rows.length) {
        container.innerHTML = `<div class="table-wrap"><table><tbody><tr class="state-row"><td colspan="${schema.cols.length}">لا توجد طلبات بعد</td></tr></tbody></table></div>`;
        tfoot.textContent = '';
        return;
      }

      const todayStr = todayRiyadh();
      const yestStr  = yesterdayRiyadh();

      // Group rows by Riyadh date
      const groups = [];
      const groupMap = {};
      rows.forEach(row => {
        const dateStr = toRiyadhDateStr(row.created_at);
        if (!groupMap[dateStr]) {
          groupMap[dateStr] = [];
          groups.push(dateStr);
        }
        groupMap[dateStr].push(row);
      });

      // Build Arabic count string
      function arCount(n) {
        return n.toLocaleString('ar-SA') + ' طلب';
      }

      const html = groups.map(dateStr => {
        const groupRows = groupMap[dateStr];
        let label;
        if (dateStr === todayStr)     label = 'اليوم';
        else if (dateStr === yestStr) label = 'أمس';
        else                          label = dateStr ? fmtGroupLabel(dateStr) : '—';

        return `<div class="day-section">
          <div class="day-label-row">
            <span class="day-label">${label}</span>
            <span class="day-badge">${arCount(groupRows.length)}</span>
          </div>
          ${buildTable(groupRows, schema)}
        </div>`;
      }).join('');

      container.innerHTML = html;
      tfoot.textContent = `عرض ${rows.length} من ${allRows.length} طلب`;
    }

    // ── SEARCH ───────────────────────────────────────────────────
    function applyFilter() {
      const q = document.getElementById('search-input').value.trim().toLowerCase();
      filteredRows = q
        ? allRows.filter(r =>
            (r.name  || '').toLowerCase().includes(q) ||
            (r.phone || '').toLowerCase().includes(q)
          )
        : [...allRows];
      renderBody(filteredRows, SCHEMAS[activeTab]);
    }

    // ── CSV EXPORT ───────────────────────────────────────────────
    function fmtDateCSV(iso) {
      if (!iso) return '';
      const d = new Date(iso);
      const p = n => String(n).padStart(2, '0');
      return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;
    }

    function csvField(v) {
      if (v === null || v === undefined) return '';
      const s = String(v);
      if (s === '') return '';
      if (/[",\r\n]/.test(s)) return '"' + s.replace(/"/g, '""') + '"';
      return s;
    }

    function buildOrdersCSV(rows) {
      const headers = [
        'رقم الطلب','التاريخ','الحالة','الاسم','الهاتف','المدينة',
        'اللون','القماش','الياقة','نوع الجسم','المقاس المفضل',
        'الطول','الوزن','العمر','مقاس الحذاء',
        'استخدم القياس بالذكاء الاصطناعي','المقاسات المحسوبة',
        'السعر','ملاحظات'
      ];
      const lines = [headers.map(csvField).join(',')];
      rows.forEach(r => {
        const aiVals = [r.ai_chest, r.ai_waist, r.ai_sleeve, r.ai_size];
        const usedAI = aiVals.some(v => v !== null && v !== undefined && v !== '');
        let aiCalc = '';
        if (usedAI) {
          const parts = [];
          if (r.ai_chest)  parts.push(`صدر ${r.ai_chest}`);
          if (r.ai_waist)  parts.push(`خصر ${r.ai_waist}`);
          if (r.ai_sleeve) parts.push(`كم ${r.ai_sleeve}`);
          if (r.ai_size)   parts.push(`مقاس ${r.ai_size}`);
          aiCalc = parts.join(' / ');
        }
        const row = [
          r.order_number, fmtDateCSV(r.created_at),
          r.status || 'طلب جديد',
          r.name, r.phone, r.city,
          r.color, r.fabric, r.collar, r.body_type, r.fit_preference,
          r.height, r.weight, r.age, r.shoe_size,
          usedAI ? 'نعم' : 'لا', aiCalc,
          r.price, r.notes
        ];
        lines.push(row.map(csvField).join(','));
      });
      return lines.join('\r\n');
    }

    function buildTailoringCSV(rows) {
      const headers = [
        'رقم الطلب','التاريخ','الاسم','الهاتف','المدينة',
        'الباقة','السعر','يوم الزيارة','وقت الزيارة','ملاحظات'
      ];
      const lines = [headers.map(csvField).join(',')];
      rows.forEach(r => {
        const row = [
          r.order_number, fmtDateCSV(r.created_at),
          r.name, r.phone, r.city,
          r.package, r.price, r.visit_day, r.visit_time, r.notes
        ];
        lines.push(row.map(csvField).join(','));
      });
      return lines.join('\r\n');
    }

    function exportCSV() {
      const rows = filteredRows;
      if (!rows || !rows.length) {
        alert('لا توجد طلبات للتصدير');
        return;
      }
      const csv = activeTab === 'orders'
        ? buildOrdersCSV(rows)
        : buildTailoringCSV(rows);

      // UTF-8 BOM (﻿) so Excel opens Arabic correctly
      const blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8;' });
      const url  = URL.createObjectURL(blob);

      const today = todayRiyadh();
      const tabSlug = activeTab === 'orders' ? 'ready-to-wear' : 'tailoring';
      const filename = `muheeb-orders-${tabSlug}-${today}.csv`;

      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(url), 100);
    }

    // ── LOAD ─────────────────────────────────────────────────────
    async function loadTab(tab) {
      const schema    = SCHEMAS[tab];
      const container = document.getElementById('table-container');
      const tfoot     = document.getElementById('tfoot');

      // Reset UI
      document.getElementById('search-input').value = '';
      tfoot.textContent = '';
      resetStats();
      container.innerHTML = `<div class="table-wrap"><table><tbody><tr class="state-row"><td colspan="${schema.cols.length}"><span class="spinner"></span> جاري التحميل...</td></tr></tbody></table></div>`;

      try {
        // NOTE: Go to Supabase → Authentication → Policies → orders table → Add policy
        // → Allow SELECT for anon → set condition to: true
        // Do the same for tailoring_orders table.
        const { data, error } = await db
          .from(schema.table)
          .select('*', { count: 'exact' })
          .order('created_at', { ascending: false });

        if (error) throw error;

        allRows      = data || [];
        filteredRows = [...allRows];

        updateStats(allRows);
        renderBody(filteredRows, schema);

        document.getElementById('conn-dot').className   = 'conn-dot ok';
        document.getElementById('conn-label').textContent = 'متصل';

      } catch (err) {
        console.error('[Dashboard] Fetch error:', err);
        container.innerHTML = `<div class="table-wrap"><table><tbody><tr class="state-row error"><td colspan="${schema.cols.length}">تعذّر تحميل البيانات — تحقق من المفتاح والاتصال</td></tr></tbody></table></div>`;
        document.getElementById('conn-dot').className    = 'conn-dot err';
        document.getElementById('conn-label').textContent = 'خطأ في الاتصال';
      }
    }

    // ── TAB SWITCH ───────────────────────────────────────────────
    function switchTab(tab) {
      if (tab === activeTab) return;
      activeTab = tab;
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('tab-' + tab).classList.add('active');
      loadTab(tab);
    }

    // ── STATUS UPDATE ─────────────────────────────────────────────
    async function updateStatus(orderId, newStatus) {
      try {
        const { error } = await db.from('orders').update({ status: newStatus }).eq('id', orderId);
        if (error) throw error;
        // Update allRows in memory
        allRows = allRows.map(r => r.id === orderId ? { ...r, status: newStatus } : r);
        filteredRows = filteredRows.map(r => r.id === orderId ? { ...r, status: newStatus } : r);
        updateStats(allRows);
      } catch (err) {
        console.error('[Dashboard] Status update error:', err);
      }
    }

    // ── FLOATING DROPDOWN ─────────────────────────────────────────
    const floatingDropdown = document.createElement('div');
    floatingDropdown.id = 'floating-dropdown';
    floatingDropdown.innerHTML = STATUS_LIST.map(s =>
      `<div class="status-option" data-status="${s.label}">
        <span class="status-option-dot" style="background:${s.color}"></span>${s.label}
      </div>`
    ).join('');
    document.body.appendChild(floatingDropdown);

    let _activePill = null;

    function closeFloatingDropdown() {
      floatingDropdown.classList.remove('open');
      _activePill = null;
    }

    function openFloatingDropdown(pill) {
      _activePill = pill;
      const rect = pill.getBoundingClientRect();
      const dropH = 240; // approx height
      const spaceBelow = window.innerHeight - rect.bottom;
      const top = spaceBelow >= dropH
        ? rect.bottom + 4
        : rect.top - dropH - 4;
      floatingDropdown.style.top  = top + 'px';
      floatingDropdown.style.right = (window.innerWidth - rect.right) + 'px';
      floatingDropdown.style.left  = 'auto';
      floatingDropdown.classList.add('open');
    }

    // Pill clicks (event delegation on table container)
    document.getElementById('table-container').addEventListener('click', function(e) {
      const pill = e.target.closest('.status-pill');
      if (pill) {
        e.stopPropagation();
        if (_activePill === pill) {
          closeFloatingDropdown();
        } else {
          openFloatingDropdown(pill);
        }
        return;
      }
    });

    // Option clicks on floating dropdown
    floatingDropdown.addEventListener('click', function(e) {
      e.stopPropagation();
      const option = e.target.closest('.status-option');
      if (!option || !_activePill) return;
      const newStatus = option.dataset.status;
      const orderId   = _activePill.dataset.orderId;
      const style     = getStatusStyle(newStatus);
      _activePill.style.background = style.bg;
      _activePill.style.color      = style.color;
      _activePill.textContent      = newStatus;
      closeFloatingDropdown();
      updateStatus(orderId, newStatus);
    });

    // Close on outside click or scroll
    document.addEventListener('click', closeFloatingDropdown);
    document.addEventListener('scroll', closeFloatingDropdown, true);

    // ── INIT ─────────────────────────────────────────────────────
    // Only load data if already authenticated (login calls loadTab itself)
    if (sessionStorage.getItem(AUTH_KEY) === '1') {
      loadTab('orders');
    }
  </script>
</body>
</html>
